law:
  uid: LAW-R
  name: Law of Reflection
  version: 1.0.0-IMMUTABLE
  machine_ir: 'ASSERT: TREATMENT_GIVEN == TREATMENT_RECEIVED; ASSERT: WHAT_IS_SOWN
    == WHAT_IS_REAPED'
  base_class: Universal_Law
  custodian: Universal
  status: IMMUTABLE
sources:
- quote: With the measure a man measures, it is measured to him.
  tradition: Babylonian Talmud, Sotah 8b
  ref: https://www.sefaria.org/Sotah.8b
- quote: For whatsoever a man soweth, that shall he also reap.
  tradition: Galatians 6:7
  ref: https://en.wikisource.org/wiki/Bible_(King_James)/Galatians#Chapter_6
- quote: What you do not wish for yourself, do not do to others.
  tradition: Confucius, Analects 15:23
  ref: https://en.wikisource.org/wiki/The_Chinese_Classics/Volume_1/Confucian_Analects
- quote: If with an impure mind a person speaks or acts, suffering follows him...
    If with a pure mind a person speaks or acts, happiness follows him like his never-departing
    shadow.
  tradition: Dhammapada 1-2
  ref: https://en.wikisource.org/wiki/Dhammapada_(Muller)
- quote: As you sow, so shall you reap.
  tradition: Guru Granth Sahib
  ref: https://en.wikiquote.org/wiki/Guru_Granth_Sahib
- quote: Now don't you understand, man, universal law? What you throw out comes back
    to you, star. Never underestimate those who you scar. Cause karma, karma, karma
    comes back to you hard.
  tradition: Ms. Lauryn Hill, Lost Ones
  ref: https://genius.com/Ms-lauryn-hill-lost-ones-lyrics
- quote: Whoever does an atom's weight of good will see it, and whoever does an atom's
    weight of evil will see it.
  tradition: "Qur\u2019an 99:7-8"
  ref: https://en.wikisource.org/wiki/The_Holy_Qur%27an_(Maulana_Muhammad_Ali)/99._The_Quaking
- quote: Good thoughts, good words, good deeds.
  tradition: Zoroastrian Scripture, Avesta
  ref: https://en.wikisource.org/wiki/Zend_Avesta
